<div class="subscribe-section rounded-xl overflow-hidden border border-zinc-200 dark:border-zinc-700 bg-slate-50 dark:bg-zinc-900/80 p-5 md:p-6">
  <h2 id="subscribe-heading" class="font-semibold text-slate-900 dark:text-slate-100 text-[15px]">
    Get incident notifications
  </h2>
  <p class="text-[13px] text-slate-500 dark:text-slate-400 mt-1">
    Email or Microsoft Teams webhook
  </p>
  <form (ngSubmit)="onSubmit()" class="mt-4 flex flex-col sm:flex-row gap-3">
    <input type="text"
           [ngModel]="email()"
           (ngModelChange)="email.set($event)"
           name="subscribeEmail"
           placeholder="your@email.gov"
           class="flex-1 min-w-0 px-4 py-2.5 rounded-lg border border-zinc-200 dark:border-zinc-600 bg-white dark:bg-zinc-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 text-[14px] focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-transparent">
    <button type="submit"
            class="px-5 py-2.5 rounded-lg border-2 border-amber-500 text-amber-600 dark:text-amber-400 bg-transparent font-semibold text-[12px] uppercase tracking-wider hover:bg-amber-500/10 dark:hover:bg-amber-500/10 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-500 focus:ring-offset-2">
      Subscribe
    </button>
  </form>
  @if (submitted()) {
    <p class="mt-3 text-[13px] text-amber-600 dark:text-amber-400">
      Thanks! We'll send notifications to that address.
    </p>
  }
</div>
