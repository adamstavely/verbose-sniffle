<div *ngIf="loading()" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3" aria-live="polite">
  @for (row of [1,2,3,4,5,6]; track row) {
    <article class="panel p-6">
      <div class="space-y-2.5">
        <div class="flex items-start justify-between gap-3">
          <div class="h-5 w-32 skeleton skeleton-shimmer rounded" aria-hidden="true"></div>
          <div class="h-6 w-16 skeleton skeleton-shimmer rounded-lg shrink-0" aria-hidden="true"></div>
        </div>
        <div class="h-3 w-24 skeleton skeleton-shimmer rounded" aria-hidden="true"></div>
      </div>
      <div class="mt-6 pt-5 border-t border-slate-100">
        <div class="h-4 w-24 skeleton skeleton-shimmer rounded" aria-hidden="true"></div>
      </div>
    </article>
  }
</div>

@if (!loading() && workspaces().length === 0) {
  <div class="panel-soft">
    <app-empty-state
      title="No workspaces yet"
      description="Workspaces will appear here once they're configured. Check back later." />
  </div>
}

@if (!loading() && workspaces().length > 0) {
  <div class="flex flex-col sm:flex-row gap-4 mb-6">
    <div class="relative flex-1">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
          <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 111.06-1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd" />
        </svg>
      </span>
      <input type="search"
             [ngModel]="searchQuery()"
             (ngModelChange)="searchQuery.set($event)"
             placeholder="Search by name or team..."
             class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition-shadow"
             aria-label="Search workspaces">
    </div>
    <select [ngModel]="statusFilter()"
            (ngModelChange)="statusFilter.set($any($event))"
            class="px-4 py-2.5 rounded-xl border border-slate-200 bg-white text-slate-700 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition-shadow sm:w-48"
            aria-label="Filter by status">
      <option value="ALL">All statuses</option>
      <option value="HEALTHY">Healthy</option>
      <option value="DEGRADED">Degraded</option>
      <option value="OUTAGE">Outage</option>
      <option value="MAINTENANCE">Maintenance</option>
      <option value="UNKNOWN">Unknown</option>
    </select>
  </div>

  <div *ngIf="filteredWorkspaces().length === 0" class="text-[15px] text-slate-500 py-2">
    No workspaces match your search.
  </div>

  <div *ngIf="filteredWorkspaces().length > 0" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
  <article *ngFor="let workspace of filteredWorkspaces(); trackBy: trackById"
           class="card card-hover p-6 flex flex-col justify-between"
           aria-label="Workspace status card">
    <header class="space-y-2.5">
      <div class="flex items-start justify-between gap-3">
        <h3 class="text-[17px] font-semibold tracking-tight text-slate-900 leading-snug">
          {{ workspace.name }}
        </h3>
        @if (workspace.level) {
          <app-status-badge [level]="workspace.level" variant="pillCompact" />
        }
      </div>
      <p *ngIf="workspace.ownerTeam" class="text-[13px] text-slate-500">
        {{ workspace.ownerTeam }}
      </p>
    </header>

    <footer class="mt-6 pt-5 border-t border-slate-100">
      <a [routerLink]="['/workspaces', workspace.id]"
         class="text-[14px] text-blue-600 hover:text-blue-700 font-medium no-underline hover:underline">
        View details
      </a>
    </footer>
  </article>
  </div>
}
