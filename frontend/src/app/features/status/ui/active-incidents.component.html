<div *ngIf="loading" class="space-y-4" aria-live="polite">
  @for (row of [1,2,3]; track row) {
    <div class="card border-l-4 border-l-slate-200 p-5">
      <div class="h-4 w-[75%] skeleton skeleton-shimmer rounded mb-3" aria-hidden="true"></div>
      <div class="flex gap-3">
        <div class="h-6 w-16 skeleton skeleton-shimmer rounded-lg" aria-hidden="true"></div>
        <div class="h-4 w-32 skeleton skeleton-shimmer rounded" aria-hidden="true"></div>
      </div>
    </div>
  }
</div>

<div *ngIf="!loading && activeIncidents.length === 0" class="card p-8 text-center border-l-4 border-l-emerald-500">
  <span class="inline-flex w-12 h-12 rounded-xl bg-emerald-100 text-emerald-600 items-center justify-center mb-3" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-6 h-6">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.857-9.809a.75.75 0 00-1.214-.882l-3.483 4.79-1.88-1.88a.75.75 0 10-1.06 1.061l2.5 2.5a.75.75 0 001.137-.089l4-5.5z" clip-rule="evenodd" />
    </svg>
  </span>
  <p class="text-[15px] font-medium text-slate-700">All systems operational</p>
  <p class="text-[14px] text-slate-500 mt-1">No active issues at this time. We'll post updates here if anything changes.</p>
</div>

<ul *ngIf="!loading && activeIncidents.length > 0"
    class="space-y-4"
    role="list"
    aria-label="Active issues we're working on">
  <li *ngFor="let incident of sortedIncidents(); trackBy: trackByIncidentId"
      class="card border-l-4 transition-shadow duration-200 hover:shadow-[var(--shadow-card-hover)]"
      [ngClass]="{
        'border-l-red-500 p-6': incident.level === 'OUTAGE',
        'border-l-amber-500 p-5': incident.level === 'DEGRADED',
        'border-l-sky-500 p-5': incident.level === 'MAINTENANCE'
      }">
    <a [routerLink]="['/incidents', incident.id]"
       class="block no-underline text-inherit hover:opacity-90 transition-opacity">
      <div class="flex gap-4">
        @if (incident.level === 'OUTAGE') {
          <span class="shrink-0 w-10 h-10 rounded-lg bg-red-100 flex items-center justify-center" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5 text-red-600">
              <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 5a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 5zM10 13a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd" />
            </svg>
          </span>
        }
        <div class="flex flex-col gap-2 min-w-0">
          <h3 class="font-semibold text-slate-900 dark:text-slate-100"
              [ngClass]="incident.level === 'OUTAGE' ? 'text-[17px]' : 'text-[15px]'">
            {{ incident.title }}
          </h3>
          <div class="flex flex-wrap items-center gap-3 text-[13px] text-slate-600 dark:text-slate-400">
            <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-[12px] font-medium"
                  [ngClass]="{
                    'bg-red-50 text-red-700 dark:bg-red-900/30 dark:text-red-400': incident.level === 'OUTAGE',
                    'bg-amber-50 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400': incident.level === 'DEGRADED',
                    'bg-sky-50 text-sky-700 dark:bg-sky-900/30 dark:text-sky-400': incident.level === 'MAINTENANCE'
                  }">
              {{ incident.level | statusLabel }}
            </span>
            <span>Started {{ incident.startedAt | relativeTime }}</span>
          </div>
        </div>
      </div>
    </a>
  </li>
</ul>
