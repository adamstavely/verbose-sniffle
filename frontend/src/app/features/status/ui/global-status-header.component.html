<section [ngClass]="bannerClass()"
         class="relative"
         aria-labelledby="page-title">
  <button type="button"
          (click)="theme.toggle()"
          class="absolute top-4 right-4 md:top-6 md:right-6 p-2 rounded-lg border border-slate-200/80 dark:border-zinc-600/80 bg-white/60 dark:bg-zinc-800/60 text-slate-600 dark:text-slate-400 hover:bg-white/80 dark:hover:bg-zinc-700/80 focus:outline-none focus:ring-2 focus:ring-teal-500/30 focus:ring-offset-2 focus:ring-offset-transparent transition-colors"
          [attr.aria-label]="theme.dark() ? 'Switch to light mode' : 'Switch to dark mode'">
    @if (theme.dark()) {
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
        <path d="M10 2a.75.75 0 01.75.75v1.5a.75.75 0 01-1.5 0v-1.5A.75.75 0 0110 2zM10 15a.75.75 0 01.75.75v1.5a.75.75 0 01-1.5 0v-1.5A.75.75 0 0110 15zM10 7a3 3 0 100 6 3 3 0 000-6zM15.657 5.404a.75.75 0 10-1.111-1.014l-1.06 1.06a.75.75 0 001.06 1.06l1.06-1.06zM4.343 14.596a.75.75 0 101.111 1.014l1.06-1.06a.75.75 0 10-1.06-1.06l-1.06 1.06zM16 10a.75.75 0 01-.75.75h-1.5a.75.75 0 010-1.5h1.5A.75.75 0 0116 10zM5 10a.75.75 0 01-.75.75h-1.5a.75.75 0 010-1.5h1.5A.75.75 0 015 10z" />
      </svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-4 h-4">
        <path fill-rule="evenodd" d="M7.455 2.004a.75.75 0 01.26.77 7 7 0 009.958 7.978.75.75 0 01.616.074 7 7 0 004.875-8.195.75.75 0 00-.944-.277 5.5 5.5 0 01-7.157 7.157.75.75 0 00-.277-.944 7 7 0 01-.978-9.958.75.75 0 01.77-.26z" clip-rule="evenodd" />
      </svg>
    }
  </button>
  <div class="hero-banner-inner flex flex-col items-center text-center">
    <h1 id="page-title" class="text-2xl md:text-3xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">
      Super App Status
    </h1>
    @if (summary(); as s) {
      <p class="mt-2 text-[15px] text-slate-600 dark:text-slate-300 max-w-md">
        {{ s.overallMessage }}
      </p>
      @if (s.incidentCount > 0) {
        <p class="mt-1 text-[13px] text-slate-500 dark:text-slate-400">
          {{ s.incidentCount }} active incident{{ s.incidentCount === 1 ? '' : 's' }}
        </p>
      }
    } @else {
      <p class="mt-2 text-[15px] text-slate-500 dark:text-slate-400 max-w-md">
        Your single source of truth for platform availability and incident updates.
      </p>
    }
  </div>
</section>
